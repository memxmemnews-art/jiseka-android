<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JiSeKa Web UI</title>
    <link rel="stylesheet" href="style.css?v=32">
</head>

<body>
    <div id="perspectiveModePanel" class="ui-element">
        <button class="mode-btn" onclick="setPerspectiveMode('PASSENGER')">조수석 앞</button>
        <button class="mode-btn active" onclick="setPerspectiveMode('FRONT')">정면</button>
        <button class="mode-btn" onclick="setPerspectiveMode('DRIVER')">운전석 앞</button>
    </div>

    <div id="guideWrapper" class="ui-element">
        <div class="guide-box" id="mainGuideBox"></div>
        <div id="dragHandle">
            <div class="handle-bar"></div>가이드 이동
        </div>
    </div>

    <div id="liveUI" class="screen active">
        <button class="shutter-btn" onclick="triggerCapture()">📸 사진 촬영</button>
    </div>

    <div id="adjustUI" class="screen">
        <img id="previewImg" src="" alt="Captured Image Preview">
    </div>

    <div id="resultUI" class="screen">
        <div id="resultContainer">
            <img id="capturedImg" src="" alt="Synthesized Final Result Preview">
        </div>
        <div class="result-actions">
            <button class="action-btn retry-btn" onclick="retry()">✕ 다시 찍기</button>
            <button class="action-btn download-btn" onclick="downloadImage()">💾 이대로 저장</button>
        </div>
    </div>

    <script src="app.js?v=32"></script>
    <script src="camera.js?v=32"></script>
</body>

</html>
