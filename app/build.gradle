plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    // 🚨 [수정 완료] 실제 패키지명인 com.jiseka.app 으로 통일했습니다.
    namespace "com.jiseka.app" 
    compileSdk 34

    defaultConfig {
        // 🚨 [수정 완료] 실제 패키지명인 com.jiseka.app 으로 통일했습니다.
        applicationId "com.jiseka.app" 
        minSdk 24  // ML Kit와 CameraX를 위한 최소 SDK
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            isMinifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    // 최신 CameraX와 안정적인 구동을 위해 Java 17 강제 적용
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        viewBinding true
    }
}

dependencies {
    // 안드로이드 기본 UI 및 코어 라이브러리
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // 웹뷰 관련 (지세카 앱의 핵심인 Vercel 오버레이 유리창용)
    implementation 'androidx.webkit:webkit:1.10.0'

    // ========================================================
    // 📷 1. CameraX 라이브러리 (버전 직접 입력으로 에러 차단)
    // ========================================================
    implementation "androidx.camera:camera-core:1.3.2"
    implementation "androidx.camera:camera-camera2:1.3.2"
    implementation "androidx.camera:camera-lifecycle:1.3.2"
    implementation "androidx.camera:camera-view:1.3.2"
    implementation "androidx.camera:camera-extensions:1.3.2"

    // ========================================================
    // 🧠 2. 지세카 핵심 AI 모듈 (ML Kit)
    // ========================================================
    // 구글 ML Kit 한국어 텍스트 인식 (온디바이스, 100% 무료)
    implementation "com.google.mlkit:text-recognition-korean:16.0.0"
    
    // ML Kit 비동기 처리를 위한 코루틴
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-play-services:1.7.3"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"
    // ========================================================

    // 테스트 라이브러리
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
